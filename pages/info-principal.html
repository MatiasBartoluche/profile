        <div id="section-container">
            <section class="section">
                <info-article class="info-article card-article"
                    title="Descripción"
                    color="bottom-orange"
                    description="Este espacio fue creado con el objetivo de presentar mi perfil, mis conocimientos y los proyectos en los que he trabajado a lo largo de mi formación y desarrollo profesional.<br><br> A continuación, se detallaran los aspectos de cómo fue creada esta página, las tecnologías utilizadas, la arquitectura de software, etc.">
                </info-article>

                <info-article class="info-article card-article"
                    title="Tecnologías"
                    color="bottom-blue"
                    description="La pagina en cuestión fue hecha con THML 5 para la estructura, CSS 3 para aplicar diferentes estilos y Javascript para la interacción con el usuario y algunos manejos de eventos.<br><br> La pagina se encuentra alojada en GitHub Pages, un servicio gratuito que permite publicar sitios web estáticos directamente desde sus repositorios. <br><br>Para la reutilización de la estructura, semántica y contenido de la página se utilizó componentes HTML. Por cada segmento de la pagina (como por ejemplo, cabecera, menú, artículos) se creó un archivo javascript que inserta dinámicamente la estructura que se requiera reutilizar.<br><br>De esta forma, los segmentos de la página se encuentran centralizados y facilita la aplicación de futuros cambios de estructura, contenido y estilos.">
                </info-article>

                <div class="section">
                    <dev-article
                        class="card-article dev-article glow-circle glow-sky"
                        image="../img/html.png"
                        title="HTML 5">
                    </dev-article>

                    <dev-article
                        class="card-article dev-article glow-circle glow-sky"
                        image="../img/css.png"
                        title="CSS 3">
                    </dev-article>

                    <dev-article
                        class="card-article dev-article glow-circle glow-sky"
                        image="../img/javascript.png"
                        title="JavaScript">
                    </dev-article>

                    <dev-article
                        class="card-article dev-article glow-circle glow-sky"
                        image="../img/github.png"
                        title="GitHub">
                    </dev-article>
                </div>

                <info-article class="info-article card-article"
                    title="Arquitectura"
                    color="bottom-sky"
                    description="Las estructuras HTML, los estilos CSS y los comportamientos con JavaScript se encuentran separados en diferentes archivos para facilitar la manipulación y modificación de dichas partes.<br><br>A su vez, los archivos se encuentran separados en diferentes directorios con la finalidad de agrupar archivos con las mismas extensiones en un solo lugar<br><br>El sistema de directorios es el siguiente:<br><br><img src=../img/directorio.png><br><br>index.html : Página principal del proyecto. <br><br>components : Carpeta que contiene los componentes reutilizables para las diferentes paginas. <br><br>css : contiene los archivos de estilos de extensión .css para aplicar estilos a la página. <br><br>docs : carpeta que contiene los archivos descargables desde la pagina, por ejemplo, archivos de extensión .pdf<br><br>img : carpeta que contiene archivos de extensión .png utilizados como recursos para las páginas. <br><br>js :  carpeta que contiene scripts de extensión.js.<br><br>pages : contiene archivos de extensión .html, utilizados para navegar a diferentes contenidos dentro de la página principal.">
                </info-article>
